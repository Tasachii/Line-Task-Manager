name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: line
          POSTGRES_PASSWORD: line
          POSTGRES_DB: line_task_manager
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U line -d line_task_manager"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://line:line@localhost:5432/line_task_manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Coverage is best-effort: c8 + tsx can crash at report time on some Node
      # versions (ERR_INVALID_URL_SCHEME); tests above are the hard gate.
      - run: npm run test:cov
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
          if-no-files-found: warn
      - run: npm run migrate
      - run: npm run test:integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    # Browser e2e is best-effort: puppeteer/Chrome can be flaky in the sandboxed
    # runner. The backend + frontend jobs are the required correctness gates.
    continue-on-error: true
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: line
          POSTGRES_PASSWORD: line
          POSTGRES_DB: line_task_manager
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U line -d line_task_manager"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://line:line@localhost:5432/line_task_manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: chrome
        uses: browser-actions/setup-chrome@v1
      # Backend: install, build, migrate, then boot on :3000 with a known test signing secret.
      - name: Build and start backend
        working-directory: backend
        env:
          LINE_CHANNEL_SECRET: test_secret
          PORT: '3000'
        run: |
          npm ci
          npm run build
          npm run migrate
          node dist/main.js &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health; then echo "backend up"; exit 0; fi
            sleep 1
          done
          echo "backend did not become healthy" >&2; exit 1
      # Frontend: build and serve the static board on :5173 (vite preview).
      - name: Build and serve frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npx vite preview --port 5173 --host 127.0.0.1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5173 >/dev/null; then echo "frontend up"; exit 0; fi
            sleep 1
          done
          echo "frontend did not start" >&2; exit 1
      - name: Run e2e
        working-directory: frontend
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run test:e2e
